<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Biteti Beauty — Lista de Confirmados</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Georgia',serif;
    background:#1a0f0a;
    color:#e8d5b7;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 20px;
  }

  /* ── login ── */
  #login{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
    width:100%;
    max-width:340px;
    margin-top:15vh;
  }
  #login h1{
    font-size:22px;
    letter-spacing:.08em;
    color:#c9a97a;
    text-align:center;
    margin-bottom:8px;
  }
  #login input{
    width:100%;
    padding:13px 18px;
    background:#2c1e16;
    border:1px solid #5a3d28;
    border-radius:8px;
    color:#e8d5b7;
    font-size:15px;
    outline:none;
    transition:border-color .2s;
  }
  #login input:focus{border-color:#c9a97a}
  #login button{
    width:100%;
    padding:13px;
    background:#c9a97a;
    color:#1a0f0a;
    border:none;
    border-radius:8px;
    font-size:15px;
    font-family:'Georgia',serif;
    letter-spacing:.06em;
    cursor:pointer;
    transition:background .2s;
  }
  #login button:hover{background:#e0c08a}
  #login .err{
    color:#e07070;
    font-size:13px;
    display:none;
  }

  /* ── dashboard ── */
  #dashboard{display:none;width:100%;max-width:900px}
  #dashboard h1{
    font-size:24px;
    color:#c9a97a;
    letter-spacing:.08em;
    margin-bottom:6px;
    text-align:center;
  }
  #dashboard .subtitle{
    text-align:center;
    font-size:13px;
    color:#8a6a50;
    margin-bottom:32px;
    letter-spacing:.04em;
  }

  #stats{
    width:100%;
    margin-bottom:32px;
  }
  .stat{
    background:#2c1e16;
    border:1px solid #3d2a1e;
    border-radius:10px;
    padding:22px 32px;
    text-align:center;
    width:100%;
  }
  .stat .num{
    font-size:48px;
    color:#c9a97a;
    line-height:1;
  }
  .stat .lbl{
    font-size:12px;
    color:#8a6a50;
    letter-spacing:.1em;
    text-transform:uppercase;
    margin-top:6px;
  }
  .live-dot{
    display:inline-block;
    width:7px;height:7px;
    background:#6dbb7a;
    border-radius:50%;
    margin-right:6px;
    vertical-align:middle;
    animation:pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:.4;transform:scale(.7)}
  }

  .table-wrap{
    background:#2c1e16;
    border:1px solid #3d2a1e;
    border-radius:12px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  table{
    width:100%;
    min-width:560px;
    border-collapse:collapse;
  }
  th{
    background:#3d2a1e;
    color:#c9a97a;
    font-size:12px;
    letter-spacing:.1em;
    text-transform:uppercase;
    padding:14px 18px;
    text-align:left;
    font-weight:normal;
  }
  td{
    padding:13px 18px;
    font-size:14px;
    color:#d4b896;
    border-top:1px solid #3d2a1e;
    vertical-align:middle;
    transition:background .3s;
  }
  tr:hover td{background:rgba(201,169,122,.06)}
  tr.new-row td{animation:highlight .9s ease-out forwards}
  @keyframes highlight{
    0%{background:rgba(201,169,122,.22)}
    100%{background:transparent}
  }
  td.muted{color:#6a4f3a;font-style:italic}
  td.date{color:#8a6a50;font-size:12px}
  td.nome{min-width:160px}
  td a{color:#c9a97a;text-decoration:none}
  td a:hover{text-decoration:underline}

  #loading{text-align:center;color:#5a3d28;padding:40px;font-size:14px}
  #empty{text-align:center;color:#5a3d28;padding:40px;font-size:14px;display:none}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <h1>Biteti Beauty<br><span style="font-size:14px;color:#8a6a50;letter-spacing:.04em">Lista de Confirmados</span></h1>
  <input id="pwd" type="password" placeholder="Senha" autocomplete="current-password"/>
  <button onclick="doLogin()">Entrar</button>
  <span id="err" class="err">Senha incorreta</span>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <h1>Biteti Beauty</h1>
  <p class="subtitle">LISTA DE CONFIRMADOS</p>

  <div id="stats">
    <div class="stat">
      <div class="num" id="total-count">—</div>
      <div class="lbl"><span class="live-dot"></span>Confirmados em tempo real</div>
    </div>
  </div>

  <div class="table-wrap">
    <div id="loading">Carregando...</div>
    <div id="empty">Nenhum confirmado ainda.</div>
    <table id="data-table" style="display:none">
      <thead>
        <tr>
          <th>#</th>
          <th>Nome</th>
          <th>Telefone</th>
          <th>Instagram</th>
          <th>Data / Hora</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
const PASS = 'Bitetize@2025';
const SB_URL = 'https://xkrefjvhaeuksojkeojj.supabase.co';
const SB_SERVICE = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhrcmVmanZoYWV1a3Nvamtlb2pqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2NzIwNjg4MCwiZXhwIjoyMDgyNzgyODgwfQ.7Nbs77oMkcxXadQZuXT8aGCnECqdv1OjTNLUQGbQ0GM';

let _db = null;
let _rows = [];

function doLogin() {
  const v = document.getElementById('pwd').value;
  if (v === PASS) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    _db = supabase.createClient(SB_URL, SB_SERVICE);
    loadData().then(startPolling);
  } else {
    document.getElementById('err').style.display = 'block';
  }
}

document.getElementById('pwd').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function fmt(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
}

function rowHtml(r, num, isNew) {
  const instaHtml = r.instagram
    ? `<a href="https://instagram.com/${r.instagram}" target="_blank">@${r.instagram}</a>`
    : '<span class="muted">—</span>';
  return `<tr data-id="${r.id}"${isNew ? ' class="new-row"' : ''}>
    <td style="color:#5a3d28;font-size:12px">${num}</td>
    <td class="nome">${r.nome}</td>
    <td>${r.telefone || '<span class="muted">—</span>'}</td>
    <td>${instaHtml}</td>
    <td class="date">${fmt(r.created_at)}</td>
  </tr>`;
}

function renderTable(animate) {
  const tbody = document.getElementById('tbody');
  document.getElementById('empty').style.display = _rows.length === 0 ? 'block' : 'none';
  document.getElementById('data-table').style.display = _rows.length === 0 ? 'none' : 'table';
  document.getElementById('total-count').textContent = _rows.length;
  tbody.innerHTML = _rows.map((r, i) => rowHtml(r, _rows.length - i, animate && i === 0)).join('');
}

async function loadData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('data-table').style.display = 'none';
  document.getElementById('empty').style.display = 'none';

  const { data, error } = await _db
    .from('rsvp_confirmacoes')
    .select('*')
    .order('created_at', { ascending: false });

  document.getElementById('loading').style.display = 'none';

  if (error || !data) {
    document.getElementById('loading').textContent = 'Erro ao carregar dados.';
    document.getElementById('loading').style.display = 'block';
    return;
  }

  _rows = data;
  renderTable(false);
}

function startPolling() {
  setInterval(async () => {
    if (!_rows.length) { await loadData(); return; }
    const latest = _rows[0].created_at;
    const { data } = await _db
      .from('rsvp_confirmacoes')
      .select('*')
      .gt('created_at', latest)
      .order('created_at', { ascending: false });
    if (data && data.length) {
      _rows = [...data, ..._rows];
      renderTable(true);
    }
  }, 5000);
}
</script>
</body>
</html>
